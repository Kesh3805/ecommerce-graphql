"""Input for updating a location"""
input UpdateLocationInput {
  address: String
  city: String
  country: String
  is_active: Boolean
  location_id: Int!
  name: String
}

"""Input for updating a product"""
input UpdateProductInput {
  brand: String
  categoryIds: [Int!]
  category_ids: [Int!]
  countryCodes: [String!]
  country_codes: [String!]
  description: String
  mediaUrls: [String!]
  media_urls: [String!]
  metafields: [ProductMetafieldInput!]
  primaryImageUrl: String
  primary_image_url: String
  productId: Int
  product_id: Int!
  publishedAt: DateTime
  published_at: DateTime
  seo: CreateProductSEOInput
  status: ProductStatus
  title: String
}

input UpdateUserInput {
  email: String
  id: Int!
  name: String
  password: String
  role: UserRole
}

"""Input for updating a variant"""
input UpdateVariantInput {
  barcode: String
  compare_at_price: Float
  cost_price: Float
  inventory_policy: InventoryPolicy
  is_default: Boolean
  media_urls: [String!]
  price: Float
  sku: String
  variant_id: Int!
  weight: Float
  weight_unit: String
}

type User {
  createdAt: DateTime!
  email: String!
  id: Int!
  name: String!
  role: String!
  status: String!
  updatedAt: DateTime!
}

"""The role of the user in the system"""
enum UserRole {
  ADMIN
  STORE_OWNER
}

"""Product variant entity"""
type Variant {
  barcode: String
  compare_at_price: Float
  cost_price: Float
  created_at: DateTime!
  inventory_item: InventoryItem
  inventory_item_id: Int
  inventory_policy: InventoryPolicy!
  is_default: Boolean!
  media_urls: [String!]
  option1_value: String
  option2_value: String
  option3_value: String
  price: Float
  product_id: Int!
  sku: String

  """Combined option values as display title"""
  title: String
  updated_at: DateTime!
  variant_id: Int!
  weight: Float
  weight_unit: String
}